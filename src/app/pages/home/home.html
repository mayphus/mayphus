<div class="home-container">
    <div class="hero">
        <div class="hero-content">
            <h1 class="title">Mayphus</h1>
            <p class="subtitle">Systematic Minimalism & Digital Garden</p>
            <p class="bio">
                Exploring the intersection of logic, mathematics, and software engineering.
                Building tools for thought and simplified systems.
            </p>

            <div class="social-links">
                <a mat-button href="https://github.com/mayphus" target="_blank">
                    <mat-icon>code</mat-icon> GitHub
                </a>
                <a mat-button href="https://mayphus.org" target="_blank">
                    <mat-icon>language</mat-icon> Website
                </a>
            </div>
        </div>
    </div>

    <mat-divider></mat-divider>

    <div class="projects-section">
        <h2>Projects</h2>
        <div class="projects-grid">
            <mat-card *ngFor="let project of projects" class="project-card">
                <mat-card-header>
                    <mat-card-title>{{ project.name }}</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <p>{{ project.description }}</p>
                    <mat-chip-set aria-label="Project tags">
                        <mat-chip *ngFor="let tag of project.tags">{{ tag }}</mat-chip>
                    </mat-chip-set>
                </mat-card-content>
                <mat-card-actions align="end">
                    <a mat-button [href]="project.link" target="_blank">VIEW PROJECT</a>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
</div>
